name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run unit tests
      run: npm run test:unit
      
    - name: Run acceptance tests
      run: npm run test:acceptance
      
    - name: Run audit tests
      run: npm run test:audit
      
    - name: Run quota tests
      run: npm run test:quota
      
    - name: Run safeguard tests
      run: npm run test:safeguard

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            [ -f /nix/var/nix/profiles/default/etc/profile.d/nix.sh ] && . /nix/var/nix/profiles/default/etc/profile.d/nix.sh
            export PATH=$PATH:/nix/var/nix/profiles/default/bin:~/.nix-profile/bin
            cd ~/.config/home-manager
            git pull origin vps_nix
            nix flake update dude
            home-manager switch
            git add flake.lock
            git commit -m "chore: update dude flake.lock [skip ci]" || true
            git push origin vps_nix
